<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0d1f2d"/>
    </linearGradient>

    <!-- Offchain gradient -->
    <linearGradient id="offchainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2744"/>
      <stop offset="100%" style="stop-color:#0f1e35"/>
    </linearGradient>

    <!-- Onchain gradient -->
    <linearGradient id="onchainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1430"/>
      <stop offset="100%" style="stop-color:#0f0d20"/>
    </linearGradient>

    <!-- Node gradients -->
    <linearGradient id="scannerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
    <linearGradient id="radarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="sniperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
    <linearGradient id="flashGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#c2410c"/>
    </linearGradient>
    <linearGradient id="profitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#be185d"/>
    </linearGradient>
    <linearGradient id="multidexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0e7490"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glowBlue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPurple" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Animated dash for arrows -->
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowYellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
    <marker id="arrowWhite" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bgGrad)" rx="12"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="60" x2="900" y2="60"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="180" x2="900" y2="180"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="360" x2="900" y2="360"/>
    <line x1="0" y1="420" x2="900" y2="420"/>
    <line x1="0" y1="480" x2="900" y2="480"/>
    <line x1="0" y1="540" x2="900" y2="540"/>
    <line x1="60" y1="0" x2="60" y2="620"/>
    <line x1="150" y1="0" x2="150" y2="620"/>
    <line x1="300" y1="0" x2="300" y2="620"/>
    <line x1="450" y1="0" x2="450" y2="620"/>
    <line x1="600" y1="0" x2="600" y2="620"/>
    <line x1="750" y1="0" x2="750" y2="620"/>
  </g>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-size="16" font-weight="bold" letter-spacing="3">
    ⚡ DeFi-MEV-Ecosystem — System Architecture
  </text>
  <line x1="100" y1="42" x2="800" y2="42" stroke="#334155" stroke-width="0.5"/>

  <!-- ═══════════════ OFF-CHAIN ZONE ═══════════════ -->
  <rect x="20" y="55" width="860" height="270" rx="8" fill="url(#offchainGrad)" stroke="#1e40af" stroke-width="1" opacity="0.9"/>
  <text x="36" y="75" fill="#60a5fa" font-family="monospace" font-size="11" font-weight="bold" letter-spacing="2">OFF-CHAIN  ·  C# / .NET</text>

  <!-- MarketScanner node -->
  <rect x="50" y="90" width="160" height="70" rx="6" fill="url(#scannerGrad)" opacity="0.9" filter="url(#glowBlue)">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="130" y="114" text-anchor="middle" fill="white" font-family="monospace" font-size="11" font-weight="bold">04_MarketScanner</text>
  <text x="130" y="130" text-anchor="middle" fill="#bae6fd" font-family="monospace" font-size="9">📡 Uniswap V3 slot0</text>
  <text x="130" y="145" text-anchor="middle" fill="#bae6fd" font-family="monospace" font-size="9">reads every 3s</text>

  <!-- RealPriceBrain node -->
  <rect x="690" y="90" width="160" height="70" rx="6" fill="url(#radarGrad)" opacity="0.9" filter="url(#glowGreen)">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="3.5s" repeatCount="indefinite"/>
  </rect>
  <text x="770" y="114" text-anchor="middle" fill="white" font-family="monospace" font-size="11" font-weight="bold">10_RealPriceBrain</text>
  <text x="770" y="130" text-anchor="middle" fill="#a7f3d0" font-family="monospace" font-size="9">🎯 PancakeSwap</text>
  <text x="770" y="145" text-anchor="middle" fill="#a7f3d0" font-family="monospace" font-size="9">vs BiSwap spreads</text>

  <!-- SniperBot node (parallel) -->
  <rect x="690" y="195" width="160" height="70" rx="6" fill="url(#sniperGrad)" opacity="0.9" filter="url(#glowBlue)">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <text x="770" y="219" text-anchor="middle" fill="white" font-family="monospace" font-size="11" font-weight="bold">13_SniperBot</text>
  <text x="770" y="235" text-anchor="middle" fill="#fde68a" font-family="monospace" font-size="9">🏹 New token</text>
  <text x="770" y="250" text-anchor="middle" fill="#fde68a" font-family="monospace" font-size="9">detector — BSC</text>

  <!-- ProfitBrain node (center) -->
  <rect x="335" y="175" width="170" height="80" rx="6" fill="url(#brainGrad)" opacity="0.95" filter="url(#glowPurple)">
    <animate attributeName="opacity" values="0.95;1;0.95" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="420" y="200" text-anchor="middle" fill="white" font-family="monospace" font-size="11" font-weight="bold">09_ProfitBrain</text>
  <text x="420" y="216" text-anchor="middle" fill="#e9d5ff" font-family="monospace" font-size="9">🧠 Risk manager</text>
  <text x="420" y="231" text-anchor="middle" fill="#e9d5ff" font-family="monospace" font-size="9">EstimateGas →</text>
  <text x="420" y="246" text-anchor="middle" fill="#e9d5ff" font-family="monospace" font-size="9">WaitForReceipt</text>

  <!-- ARROWS OFF-CHAIN -->
  <!-- Scanner → ProfitBrain -->
  <path d="M210,125 Q290,125 335,210" stroke="#0ea5e9" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowBlue)">
    <animate attributeName="stroke-dashoffset" values="0;-18" dur="1s" repeatCount="indefinite"/>
  </path>
  <!-- RealPriceBrain → ProfitBrain -->
  <path d="M690,125 Q600,125 505,210" stroke="#10b981" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowGreen)">
    <animate attributeName="stroke-dashoffset" values="0;-18" dur="1s" repeatCount="indefinite"/>
  </path>
  <!-- SniperBot → ProfitBrain -->
  <path d="M690,230 Q600,230 505,230" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowYellow)">
    <animate attributeName="stroke-dashoffset" values="0;-18" dur="1s" repeatCount="indefinite"/>
  </path>

  <!-- Spread threshold label -->
  <rect x="340" y="127" width="160" height="28" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="420" y="145" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">spread ≥ threshold?</text>
  <line x1="420" y1="125" x2="420" y2="175" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="1s" repeatCount="indefinite"/>
  </line>

  <!-- RPC label -->
  <text x="420" y="305" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">RPC / Alchemy</text>

  <!-- Down arrow to onchain -->
  <line x1="420" y1="255" x2="420" y2="320" stroke="#6366f1" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowPurple)">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="0.8s" repeatCount="indefinite"/>
  </line>

  <!-- ═══════════════ ON-CHAIN ZONE ═══════════════ -->
  <rect x="20" y="335" width="860" height="240" rx="8" fill="url(#onchainGrad)" stroke="#4c1d95" stroke-width="1" opacity="0.9"/>
  <text x="36" y="358" fill="#a78bfa" font-family="monospace" font-size="11" font-weight="bold" letter-spacing="2">ON-CHAIN  ·  SOLIDITY</text>

  <!-- FlashLoanBot -->
  <rect x="80" y="370" width="170" height="80" rx="6" fill="url(#flashGrad)" opacity="0.9" filter="url(#glowBlue)">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="4s" repeatCount="indefinite"/>
  </rect>
  <text x="165" y="394" text-anchor="middle" fill="white" font-family="monospace" font-size="11" font-weight="bold">FlashLoanBot</text>
  <text x="165" y="410" text-anchor="middle" fill="#fed7aa" font-family="monospace" font-size="9">⚡ Aave V3 receiver</text>
  <text x="165" y="425" text-anchor="middle" fill="#fed7aa" font-family="monospace" font-size="9">Ethereum Mainnet</text>
  <text x="165" y="440" text-anchor="middle" fill="#fed7aa" font-family="monospace" font-size="9">executeOperation()</text>

  <!-- ProfitBot -->
  <rect x="570" y="370" width="170" height="80" rx="6" fill="url(#profitGrad)" opacity="0.9" filter="url(#glowBlue)">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="3.2s" repeatCount="indefinite"/>
  </rect>
  <text x="655" y="394" text-anchor="middle" fill="white" font-family="monospace" font-size="11" font-weight="bold">ProfitBot</text>
  <text x="655" y="410" text-anchor="middle" fill="#fbcfe8" font-family="monospace" font-size="9">🔄 PancakeSwap V2/V3</text>
  <text x="655" y="425" text-anchor="middle" fill="#fbcfe8" font-family="monospace" font-size="9">BSC Mainnet</text>
  <text x="655" y="440" text-anchor="middle" fill="#fbcfe8" font-family="monospace" font-size="9">require(profit)</text>

  <!-- MultiDex bottom -->
  <rect x="335" y="475" width="170" height="75" rx="6" fill="url(#multidexGrad)" opacity="0.9" filter="url(#glowBlue)">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="3.8s" repeatCount="indefinite"/>
  </rect>
  <text x="420" y="498" text-anchor="middle" fill="white" font-family="monospace" font-size="11" font-weight="bold">SniperBot + MultiDex</text>
  <text x="420" y="514" text-anchor="middle" fill="#a5f3fc" font-family="monospace" font-size="9">BSC Mainnet</text>
  <text x="420" y="529" text-anchor="middle" fill="#a5f3fc" font-family="monospace" font-size="9">x·y=k · amountOutMin</text>
  <text x="420" y="544" text-anchor="middle" fill="#a5f3fc" font-family="monospace" font-size="9">require(profit)</text>

  <!-- ARROWS ON-CHAIN -->
  <!-- FlashLoanBot → MultiDex -->
  <path d="M165,450 Q165,512 335,512" stroke="#f97316" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowOrange)">
    <animate attributeName="stroke-dashoffset" values="0;-18" dur="1.2s" repeatCount="indefinite"/>
  </path>
  <!-- ProfitBot → MultiDex -->
  <path d="M655,450 Q655,512 505,512" stroke="#ec4899" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowOrange)">
    <animate attributeName="stroke-dashoffset" values="0;-18" dur="1.2s" repeatCount="indefinite"/>
  </path>

  <!-- RPC trigger arrows from ProfitBrain down to contracts -->
  <path d="M380,320 Q280,355 250,370" stroke="#6366f1" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowPurple)">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="1s" repeatCount="indefinite"/>
  </path>
  <path d="M460,320 Q560,355 620,370" stroke="#6366f1" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowPurple)">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="1s" repeatCount="indefinite"/>
  </path>

  <!-- Formula bar bottom -->
  <rect x="200" y="572" width="500" height="24" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="450" y="588" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">
    x · y = k  ·  amountOutMin  ·  require(cantidadFinal ≥ totalDeuda)  ·  Ownable
  </text>

  <!-- Pulsing dots on arrows to show data flow -->
  <circle r="4" fill="#0ea5e9" opacity="0.9">
    <animateMotion dur="2s" repeatCount="indefinite">
      <mpath href="#path-scanner"/>
    </animateMotion>
  </circle>

  <!-- Legend -->
  <g transform="translate(30, 575)">
    <rect width="8" height="8" rx="2" fill="#0ea5e9"/>
    <text x="12" y="8" fill="#64748b" font-family="monospace" font-size="9">Scanner</text>
    <rect x="70" width="8" height="8" rx="2" fill="#10b981"/>
    <text x="82" y="8" fill="#64748b" font-family="monospace" font-size="9">Radar</text>
    <rect x="120" width="8" height="8" rx="2" fill="#8b5cf6"/>
    <text x="132" y="8" fill="#64748b" font-family="monospace" font-size="9">Brain</text>
    <rect x="170" width="8" height="8" rx="2" fill="#f59e0b"/>
    <text x="182" y="8" fill="#64748b" font-family="monospace" font-size="9">Sniper</text>
  </g>

</svg>
