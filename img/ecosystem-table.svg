  <!-- Scanning line animation -->
  <rect x="30" y="74" width="800" height="2" fill="#0ea5e9" opacity="0.3">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,280;0,0" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0" dur="5s" repeatCount="indefinite"/>
  </rect>
